<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This hidden tag prevents Google from showing your site to the public -->
    <meta name="robots" content="noindex, nofollow">
    <title>City Taxi Directory (In Development)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            text-align: center;
            padding: 20px 0;
            background-color: #f1c40f; /* Taxi Yellow */
            color: #000;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        h1 { margin: 0; font-size: 28px; }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .city-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .taxi-card {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .taxi-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .taxi-info {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .call-btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🚕 Local Taxi Directory (Under Construction)</h1>
    </header>

    <div class="container">
        <div class="city-title">Development Preview</div>
        <div class="taxi-card">
            <div class="taxi-name">Website Setup Successful!</div>
            <div class="taxi-info">Your layout is ready. Nobody can find this domain yet.</div>
        </div>
    </div>

</body>
</html>
