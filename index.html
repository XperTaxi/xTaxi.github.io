<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>xTaxi | Premium North American Directory</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #f1c40f;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --action-green: #10b981;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 2px solid rgba(241, 196, 15, 0.15);
        }
        header h1 { 
            margin: 0; 
            font-size: 46px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #ffffff 30%, #f39c12 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { margin: 12px 0 0; font-size: 15px; color: var(--text-muted); }
        .filter-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 24px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .filter-group { display: inline-block; margin: 8px 20px; text-align: left; }
        .filter-group label {
            color: var(--primary);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 8px;
        }
        .filter-group select {
            font-family: 'Montserrat', sans-serif;
            padding: 14px 20px;
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 260px;
            font-weight: 600;
            background-color: #0f172a;
            color: var(--text-main);
            outline: none;
        }
        .filter-group select:disabled { opacity: 0.4; }
        .container { max-width: 750px; margin: 50px auto; padding: 0 20px; }
        .instruction-box {
            background: var(--card-dark);
            padding: 45px 30px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .instruction-box h2 { margin-top: 0; color: #ffffff; font-size: 24px; }
        .city-results-header {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 25px;
            color: #ffffff;
            display: none;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            text-transform: uppercase;
        }
        .taxi-card {
            background: var(--card-dark);
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .taxi-details { flex: 1; padding-right: 20px; }
        .taxi-name { font-size: 20px; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
        .taxi-info { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
        .call-btn {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--action-green) 0%, #059669 100%);
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
        }
        @media (max-width: 640px) {
            .filter-group { display: block; margin: 12px 0; }
            .filter-group select { width: 100%; }
            .taxi-card { flex-direction: column; text-align: center; }
            .taxi-details { padding-right: 0; margin-bottom: 20px; }
            .call-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <h1>xTaxi Directory</h1>
        <p>A premium localized network directory providing rapid access to verified dispatch fleets across US & Canada.</p>
    </header>

    <div class="filter-container">
        <div class="filter-group">
            <label for="regionSelect">Select Country Zone</label>
            <select id="regionSelect" onchange="updateCityDropdown()">
                <option value="">-- Choose Region --</option>
                <option value="can_east">🇨🇦 Eastern / Atlantic Canada</option>
                <option value="can_west">🇨🇦 Western / Central Canada</option>
                <option value="us_east">🇺🇸 Eastern United States</option>
                <option value="us_west">🇺🇸 Western United States</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="citySelect">Select Target Market</label>
            <select id="citySelect" onchange="renderTaxiList()" disabled>
                <option value="">-- Choose Region First --</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div id="welcomeBox" class="instruction-box">
            <h2>Intelligent Transport Gateway</h2>
            <p>Refine your operational territory filters using the menu configuration selectors to instantly retrieve responsive, quick-dial contact grids.</p>
        </div>
        <div id="resultsHeader" class="city-results-header"></div>
        <div id="taxiList"></div>
    </div>

    <!-- This links your page cleanly to your data script without cutting text off -->
    <script src="database.js?v=6"></script>
</body>
</html>
